name: Sync product feed

on:
  schedule:
    # Every night at 03:00 UTC (05:00 CEST / 04:00 CET)
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sync/package.json

      - name: Install dependencies
        working-directory: sync
        run: npm install

      - name: Run feed sync
        working-directory: sync
        env:
          LOVABLE_SUPABASE_URL: ${{ secrets.LOVABLE_SUPABASE_URL }}
          LOVABLE_SUPABASE_SERVICE_KEY: ${{ secrets.LOVABLE_SUPABASE_SERVICE_KEY }}
        run: node sync-feed.js
